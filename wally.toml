[package]
name = "crime-vault/game"
version = "0.1.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

# Shared (доступны и серверу и клиенту) — в ReplicatedStorage.Packages
[dependencies]
Knit = "sleitnick/knit@1.7.0"
Signal = "sleitnick/signal@2.0.3"
Promise = "evaera/promise@4.0.0"

# Серверные пакеты — в ServerScriptService.ServerPackages
[server-dependencies]
ProfileStore = "lm-loleris/profilestore@1.0.3"

# Только для разработки (тесты, инструменты) — в ReplicatedStorage.DevPackages
[dev-dependencies]
TestEZ = "roblox/testez@0.4.1"
